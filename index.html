<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who's The Spy Online</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <!-- PAGE: NAME -->
    <section class="card" id="namePage">
      <div class="logo">🕵️</div>
      <h1>Who's The Spy</h1>
      <p class="sub">Masuk pakai nama dulu. Kalau kosong otomatis jadi Guest.</p>

      <input id="nameInput" type="text" placeholder="Nama kamu..." maxlength="18" />
      <button id="saveNameBtn">Lanjut</button>
    </section>

    <!-- PAGE: MENU -->
    <section class="card hidden" id="menuPage">
      <div class="mini-top">
        <div>
          <p class="label">Player</p>
          <h1 id="playerNameText">Guest</h1>
        </div>
        <button class="small ghost" id="changeNameBtn">Ganti</button>
      </div>

      <p class="sub">Buat room baru atau gabung pakai kode teman.</p>

      <button id="createRoomBtn">Buat Room</button>

      <div class="divider"><span>atau</span></div>

      <div class="join-box">
        <input id="roomCodeInput" type="text" placeholder="Kode room, contoh A8K2P" maxlength="6" />
        <button id="joinRoomBtn">Gabung Room</button>
      </div>
    </section>

    <!-- PAGE: ROOM / GAME -->
    <section class="card hidden" id="roomPage">
      <div class="top-room">
        <div>
          <p class="label">Kode Room</p>
          <h2 id="roomCodeText">-----</h2>
        </div>
        <button class="small" id="copyCodeBtn">Salin</button>
      </div>

      <div class="status-pill">
        Status: <span id="roomStatusText">waiting</span>
      </div>

      <h3>Player</h3>
      <div id="playersList" class="players"></div>

      <div id="gameArea" class="game-area"></div>

      <button class="danger" id="leaveRoomBtn">Keluar Room</button>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
